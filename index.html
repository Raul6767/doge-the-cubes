<!DOCTYPE html>
<html>
<head>
  <title>Doge The Cubes</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #0b0f2a, #000000);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    canvas {
      display: block;
      margin: auto;
      background: transparent;
    }

    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
    }
  </style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x: canvas.width / 2,
  y: canvas.height - 80,
  size: 20,
  speed: 8
};

let cubes = [];
let score = 0;
let gameOver = false;
let keys = {};

document.addEventListener("keydown", (e) => {
  keys[e.key] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

function spawnCube() {
  cubes.push({
    x: Math.random() * canvas.width,
    y: -20,
    size: 20,
    speed: 4 + Math.random() * 3
  });
}

function drawPlayer() {
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - player.size);
  ctx.lineTo(player.x - player.size, player.y + player.size);
  ctx.lineTo(player.x + player.size, player.y + player.size);
  ctx.closePath();
  ctx.fill();
}

function drawCubes() {
  ctx.fillStyle = "red";
  cubes.forEach((cube, index) => {
    cube.y += cube.speed;

    ctx.fillRect(cube.x, cube.y, cube.size, cube.size);

    // Collision
    if (
      cube.y + cube.size > player.y - player.size &&
      cube.x < player.x + player.size &&
      cube.x + cube.size > player.x - player.size &&
      cube.y < player.y + player.size
    ) {
      gameOver = true;
    }

    if (cube.y > canvas.height) {
      cubes.splice(index, 1);
      score++;
    }
  });
}

function update() {
  if (gameOver) {
    alert("Game Over! Final Score: " + score);
    document.location.reload();
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Movement
  if (keys["ArrowLeft"]) {
    player.x -= player.speed;
  }
  if (keys["ArrowRight"]) {
    player.x += player.speed;
  }

  // DIE IF TOUCH WALL
  if (
    player.x - player.size <= 0 ||
    player.x + player.size >= canvas.width
  ) {
    gameOver = true;
  }

  drawPlayer();
  drawCubes();

  scoreDisplay.innerText = "Score: " + score;

  requestAnimationFrame(update);
}

setInterval(spawnCube, 800);
update();
</script>

</body>
</html>

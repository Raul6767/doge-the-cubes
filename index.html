<!DOCTYPE html>
<html>
<head>
  <title>Doge The Cubes</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #0b0f2a, #000000);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    canvas {
      display: block;
      margin: auto;
      background: transparent;
    }

    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
    }

    #leaderboard {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
    }
  </style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="leaderboard"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");
const leaderboardDisplay = document.getElementById("leaderboard");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player;
let cubes;
let score;
let gameOver;
let keys = {};

let leaderboard = JSON.parse(localStorage.getItem("dogeLeaderboard")) || [];

function initGame() {
  player = {
    x: canvas.width / 2,
    y: canvas.height - 80,
    size: 20,
    speed: 8
  };

  cubes = [];
  score = 0;
  gameOver = false;
}

function saveScore(finalScore) {
  const name = prompt("New Score! Enter your name:");

  if (!name) return;

  leaderboard.push({ name: name, score: finalScore });
  leaderboard.sort((a, b) => b.score - a.score);
  leaderboard = leaderboard.slice(0, 5);

  localStorage.setItem("dogeLeaderboard", JSON.stringify(leaderboard));
}

function drawLeaderboard() {
  leaderboardDisplay.innerHTML = "<b>🏆 Leaderboard</b><br>";
  leaderboard.forEach((entry, index) => {
    leaderboardDisplay.innerHTML += 
      `${index + 1}. ${entry.name} - ${entry.score}<br>`;
  });
}

document.addEventListener("keydown", (e) => {
  keys[e.key] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

function spawnCube() {
  cubes.push({
    x: Math.random() * canvas.width,
    y: -20,
    size: 20,
    speed: 4 + Math.random() * 3
  });
}

function drawPlayer() {
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - player.size);
  ctx.lineTo(player.x - player.size, player.y + player.size);
  ctx.lineTo(player.x + player.size, player.y + player.size);
  ctx.closePath();
  ctx.fill();
}

function drawCubes() {
  ctx.fillStyle = "red";
  cubes.forEach((cube, index) => {
    cube.y += cube.speed;

    ctx.fillRect(cube.x, cube.y, cube.size, cube.size);

    if (
      cube.y + cube.size > player.y - player.size &&
      cube.x < player.x + player.size &&
      cube.x + cube.size > player.x - player.size &&
      cube.y < player.y + player.size
    ) {
      endGame();
    }

    if (cube.y > canvas.height) {
      cubes.splice(index, 1);
      score++;
    }
  });
}

function endGame() {
  gameOver = true;
  saveScore(score);
  drawLeaderboard();
  alert("Game Over! Final Score: " + score);
  initGame();
}

function update() {
  if (gameOver) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (keys["ArrowLeft"]) {
    player.x -= player.speed;
  }
  if (keys["ArrowRight"]) {
    player.x += player.speed;
  }

  if (
    player.x - player.size <= 0 ||
    player.x + player.size >= canvas.width
  ) {
    endGame();
  }

  drawPlayer();
  drawCubes();

  scoreDisplay.innerText = "Score: " + score;

  requestAnimationFrame(update);
}

setInterval(spawnCube, 800);

initGame();
drawLeaderboard();
update();
</script>

</body>
</html>

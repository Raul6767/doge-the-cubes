<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");
const leaderboardDisplay = document.getElementById("leaderboard");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player;
let cubes;
let score;
let gameOver;
let keys = {};

let spawnInterval = 800;
let spawnTimer;
let speedMultiplier = 1;

let leaderboard = JSON.parse(localStorage.getItem("dogeLeaderboard")) || [];

/* ================= GAME SETUP ================= */

function initGame() {
  player = {
    x: canvas.width / 2,
    y: canvas.height - 80,
    size: 20,
    speed: 8
  };

  cubes = [];
  score = 0;
  gameOver = false;
  speedMultiplier = 1;
  spawnInterval = 800;

  clearInterval(spawnTimer);
  spawnTimer = setInterval(spawnCube, spawnInterval);
}

/* ================= LEADERBOARD ================= */

function saveScore(finalScore) {
  const name = prompt("Enter your name:");
  if (!name) return;

  const cleanName = name.trim();

  const existingIndex = leaderboard.findIndex(
    entry => entry.name.toLowerCase() === cleanName.toLowerCase()
  );

  if (existingIndex !== -1) {
    if (finalScore > leaderboard[existingIndex].score) {
      leaderboard[existingIndex].score = finalScore;
    }
  } else {
    leaderboard.push({ name: cleanName, score: finalScore });
  }

  leaderboard.sort((a, b) => b.score - a.score);
  leaderboard = leaderboard.slice(0, 5);

  localStorage.setItem("dogeLeaderboard", JSON.stringify(leaderboard));
  drawLeaderboard();
}

function drawLeaderboard() {
  leaderboardDisplay.innerHTML = "<b>🏆 Leaderboard</b><br>";
  leaderboard.forEach((entry, index) => {
    leaderboardDisplay.innerHTML += 
      `${index + 1}. ${entry.name} - ${entry.score}<br>`;
  });
}

/* ================= CONTROLS ================= */

document.addEventListener("keydown", (e) => {
  keys[e.key] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

/* ================= SPAWN SYSTEM ================= */

function spawnCube() {
  if (gameOver) return;

  cubes.push({
    x: Math.random() * (canvas.width - 20),
    y: -20,
    size: 20,
    speed: (4 + Math.random() * 3) * speedMultiplier
  });
}

/* ================= DRAW PLAYER ================= */

function drawPlayer() {
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - player.size);
  ctx.lineTo(player.x - player.size, player.y + player.size);
  ctx.lineTo(player.x + player.size, player.y + player.size);
  ctx.closePath();
  ctx.fill();
}

/* ================= DRAW CUBES ================= */

function drawCubes() {
  ctx.fillStyle = "red";

  cubes.forEach((cube, index) => {
    cube.y += cube.speed;
    ctx.fillRect(cube.x, cube.y, cube.size, cube.size);

    // Collision
    if (
      cube.y + cube.size > player.y - player.size &&
      cube.x < player.x + player.size &&
      cube.x + cube.size > player.x - player.size &&
      cube.y < player.y + player.size
    ) {
      endGame();
    }

    // Passed screen
    if (cube.y > canvas.height) {
      cubes.splice(index, 1);
      score++;

      // Difficulty scaling every 5 score
      if (score % 5 === 0) {
        speedMultiplier += 0.25;

        if (spawnInterval > 250) {
          spawnInterval -= 50;
          clearInterval(spawnTimer);
          spawnTimer = setInterval(spawnCube, spawnInterval);
        }
      }
    }
  });
}

/* ================= GAME OVER ================= */

function endGame() {
  gameOver = true;
  clearInterval(spawnTimer);
  saveScore(score);
  alert("Game Over! Final Score: " + score);
  initGame();
}

/* ================= MAIN LOOP ================= */

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;

    if (
      player.x - player.size <= 0 ||
      player.x + player.size >= canvas.width
    ) {
      endGame();
    }

    drawCubes();
    scoreDisplay.innerText = "Score: " + score;
  }

  drawPlayer();
  requestAnimationFrame(update);
}

/* ================= START ================= */

initGame();
drawLeaderboard();
update();
</script>
